version: "3.9"

services:

  api:
    build: .
    container_name: ai_gateway_api

    # ports:
    #   - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: ai_gateway_postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aigateway}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}

    # ports:
    #   - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_gateway_redis

    # ports:
    #   - "6379:6379"
  
  prometheus:
    image: prom/prometheus
    container_name: ai_gateway_prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: ai_gateway_grafana

    ports:
      - "3000:3000"
    
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
  
  
  jaeger:
    image: jaegertracing/all-in-one:latest

    container_name: ai_gateway_jaeger

    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  nginx:
    image: nginx:latest
    container_name: ai_gateway_nginx

    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  worker:
    build: .
    container_name: ai_gateway_worker

    command: celery -A app.workers.celery_app worker --loglevel=info

    env_file:
      - .env

    depends_on:
      - redis
      - postgres

  beat:
    build: .
    container_name: ai_gateway_beat

    command: celery -A app.workers.celery_app beat --loglevel=info

    env_file:
      - .env

    depends_on:
      - redis
      - postgres

volumes:
  postgres_data: